<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secro Homepage</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            font-family: Arial, sans-serif;
            color: #ffffff;
            line-height: 1.6;
        }

        .header {
            padding: 20px 40px;
            display: flex;
            justify-content: flex-start;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            height: 40px;
            width: auto;
        }

        .hero {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 0 20px;
        }

        .subtitle {
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3rem;
            line-height: 1.2;
            max-width: 800px;
            margin: 0 0 30px;
        }

        .description {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            max-width: 600px;
            margin-bottom: 40px;
        }

        .cta-button {
            background-color: #ffffff;
            color: #1a1a1a;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .cta-button:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <header class="header">
        <img src="image (3).png" alt="Secro Logo" class="logo">
    </header>
    
    <div class="hero">
        <div class="subtitle">Talk securely</div>
        <h1>Secro is a private communication platform.</h1>
        <p class="description">Where every conversation and file belongs entirely to you, secured with full encryption.</p>
        <a href="information.html" class="cta-button">Information</a>
    </div>
</body>
</html>
